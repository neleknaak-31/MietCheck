services:
  app:
    build:
      context: .
    ports:
      - "8501:8501"
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.14.0
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:////mlflow/mlflow.db
      - --artifacts-destination
      - /mlflow/artifacts
      - --serve-artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    restart: unless-stopped

volumes:
  mlflow-data:

